name: Validate Production Build

on:
  push:
    branches:
      - main

jobs:
  validate-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate Build
        run: npm run build
        
      - name: Ready for CloudCannon
        run: echo "Build validation successful. CloudCannon will now deploy."
